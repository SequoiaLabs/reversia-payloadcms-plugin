name: Sync Wiki

# Mirrors `docs/` into the repository wiki on every push to `main` that
# touches the docs. The wiki must be enabled and initialised once manually
# (Settings → Features → Wikis, then click "Create the first page") before
# the action can push to it.
on:
  push:
    branches: [main]
    paths:
      - docs/**
      - .github/workflows/wiki-sync.yml
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      # GitHub wikis are flat and use `Home.md` as the landing page. Stage a
      # copy of `docs/` with README renamed so the wiki has a proper home.
      - name: Stage wiki content
        run: |
          rm -rf .wiki-stage
          cp -R docs .wiki-stage
          if [ -f .wiki-stage/README.md ]; then
            mv .wiki-stage/README.md .wiki-stage/Home.md
          fi

      - uses: Andrew-Chen-Wang/github-wiki-action@v4
        with:
          path: .wiki-stage
